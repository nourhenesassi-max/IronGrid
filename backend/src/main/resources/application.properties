spring.application.name=IronGrid

spring.datasource.url=jdbc:mysql://localhost:3306/IronGrid?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin321
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8081}
server.address=${SERVER_ADDRESS:0.0.0.0}

app.jwt.secret=01234567890123456789012345678901
app.jwt.expirationMinutes=240

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB

app.upload.expenses-dir=uploads/expenses
app.upload.dir=uploads
app.base-url=${APP_BASE_URL:http://127.0.0.1:${server.port}}

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=irongrid.app@gmail.com
app.mail.fromName=IronGrid

app.surveillance.provider-name=${SURVEILLANCE_PROVIDER_NAME:database}
app.surveillance.live-base-url=${SURVEILLANCE_LIVE_BASE_URL:}
app.surveillance.archive-base-url=${SURVEILLANCE_ARCHIVE_BASE_URL:}
